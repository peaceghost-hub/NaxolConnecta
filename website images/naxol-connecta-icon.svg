<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08081a"/>
      <stop offset="100%" stop-color="#0d1030"/>
    </linearGradient>
    <linearGradient id="nfill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8d8f8"/>
    </linearGradient>
    <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="aura2" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/></feMerge>
    </filter>
    <filter id="hexglow2" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background square -->
  <rect x="0" y="0" width="200" height="200" rx="28" fill="url(#bg2)"/>

  <!-- Subtle circuit lines -->
  <g opacity="0.07" stroke="#00e5ff" stroke-width="0.5" fill="none">
    <line x1="20" y1="50"  x2="180" y2="50"/>
    <line x1="20" y1="100" x2="180" y2="100"/>
    <line x1="20" y1="150" x2="180" y2="150"/>
    <line x1="50"  y1="20" x2="50"  y2="180"/>
    <line x1="100" y1="20" x2="100" y2="180"/>
    <line x1="150" y1="20" x2="150" y2="180"/>
  </g>

  <!-- Hex: center (100, 100), radius 74 -->
  <!-- flat-top vertices: -->
  <!-- top:    (100, 26)                                       -->
  <!-- tr:     (100+74*sin60, 100-74*cos60) = (164.1, 63)     -->
  <!-- br:     (164.1, 137)                                    -->
  <!-- bottom: (100, 174)                                      -->
  <!-- bl:     (35.9, 137)                                     -->
  <!-- tl:     (35.9, 63)                                      -->

  <!-- Aura behind hex -->
  <polygon points="100,26 164,63 164,137 100,174 36,137 36,63"
           fill="#00e5ff" opacity="0.10" filter="url(#aura2)"/>

  <!-- Hex outer glow ring -->
  <polygon points="100,26 164,63 164,137 100,174 36,137 36,63"
           fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.5"
           filter="url(#hexglow2)"/>

  <!-- Hex outer crisp ring -->
  <polygon points="100,26 164,63 164,137 100,174 36,137 36,63"
           fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.72"/>

  <!-- Inner hex ring -->
  <polygon points="100,38 152,68 152,132 100,162 48,132 48,68"
           fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0.2"/>

  <!-- Circuit traces: N-corners to hex vertices -->
  <line x1="64" y1="55"  x2="36" y2="63"  stroke="#00e5ff" stroke-width="1.8" opacity="0.6"/>
  <line x1="136" y1="55" x2="164" y2="63" stroke="#00e5ff" stroke-width="1.8" opacity="0.6"/>
  <line x1="64" y1="145" x2="36" y2="137" stroke="#00e5ff" stroke-width="1.8" opacity="0.6"/>
  <line x1="136" y1="145" x2="164" y2="137" stroke="#00e5ff" stroke-width="1.8" opacity="0.6"/>

  <!-- N LETTER: x=[64,136], y=[55,145] — 72px wide, 90px tall, bar 13px -->
  <path d="M 64 55
           L 64 145
           L 77 145
           L 77 89
           L 123 145
           L 136 145
           L 136 55
           L 123 55
           L 123 111
           L 77 55
           Z"
        fill="url(#nfill2)"/>

  <!-- Node dots with glow -->
  <circle cx="64"  cy="55"  r="7" fill="#00e5ff" filter="url(#glow2)"/>
  <circle cx="64"  cy="55"  r="3" fill="#ffffff"/>
  <circle cx="136" cy="55"  r="7" fill="#00e5ff" filter="url(#glow2)"/>
  <circle cx="136" cy="55"  r="3" fill="#ffffff"/>
  <circle cx="64"  cy="145" r="7" fill="#00e5ff" filter="url(#glow2)"/>
  <circle cx="64"  cy="145" r="3" fill="#ffffff"/>
  <circle cx="136" cy="145" r="7" fill="#00e5ff" filter="url(#glow2)"/>
  <circle cx="136" cy="145" r="3" fill="#ffffff"/>
  <!-- Center diagonal node -->
  <circle cx="100" cy="100" r="5" fill="#00e5ff" opacity="0.7" filter="url(#glow2)"/>

  <!-- Hex vertex dots -->
  <circle cx="100" cy="26"  r="3" fill="#00e5ff" opacity="0.45"/>
  <circle cx="164" cy="63"  r="3" fill="#00e5ff" opacity="0.45"/>
  <circle cx="164" cy="137" r="3" fill="#00e5ff" opacity="0.45"/>
  <circle cx="100" cy="174" r="3" fill="#00e5ff" opacity="0.45"/>
  <circle cx="36"  cy="137" r="3" fill="#00e5ff" opacity="0.45"/>
  <circle cx="36"  cy="63"  r="3" fill="#00e5ff" opacity="0.45"/>

  <!-- "NC" small label at bottom (optional small tag) -->
  <!-- Orange accent dot bottom center -->
  <circle cx="100" cy="186" r="3.5" fill="#ff6b00" opacity="0.7"/>
</svg>
